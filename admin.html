<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin · Com.Art.Pro</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" href="/public/logo.png?v=3">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{--ink:#0e1a2b;--ink-soft:#2a3a55;--paper:#f4efe4;--paper-alt:#ebe4d4;--brand:#2d7a3e;--brand-dark:#1e5a2c;--brand-soft:#4a9f6b;--gold:#c89b3c;--red:#b8372e;--line:rgba(14,26,43,.12)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',sans-serif;background:var(--paper);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased}
  a{color:inherit}
  img{max-width:100%;display:block}

  /* LOGIN */
  .login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
  .login-card{background:#fff;border-radius:18px;padding:3rem;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(14,26,43,.1)}
  .login-card .logo{width:72px;height:72px;border-radius:50%;background:var(--brand);margin:0 auto 1.5rem;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .login-card .logo img{width:100%;height:100%;object-fit:contain;padding:4px}
  .login-card h1{font-family:'Fraunces',serif;font-size:1.6rem;text-align:center;margin-bottom:.4rem}
  .login-card .sub{text-align:center;color:var(--ink-soft);font-size:.9rem;margin-bottom:2rem}
  .field{margin-bottom:1.2rem}
  .field label{display:block;font-size:.8rem;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-soft);font-weight:600;margin-bottom:.4rem}
  .field input,.field textarea,.field select{width:100%;padding:.9rem 1rem;border:1px solid var(--line);background:var(--paper-alt);border-radius:10px;font-family:inherit;font-size:.95rem;color:var(--ink)}
  .field input:focus,.field textarea:focus,.field select:focus{outline:0;border-color:var(--brand);background:#fff}
  .field textarea{resize:vertical;min-height:100px}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:.5rem;padding:.9rem 1.5rem;border-radius:999px;font-weight:600;text-decoration:none;font-size:.95rem;border:0;cursor:pointer;font-family:inherit;transition:all .2s}
  .btn.primary{background:var(--brand);color:#fff;width:100%}
  .btn.primary:hover{background:var(--brand-dark)}
  .btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
  .btn.ghost:hover{border-color:var(--brand)}
  .btn.danger{background:var(--red);color:#fff}
  .btn.danger:hover{background:#8a2318}
  .btn.small{padding:.5rem 1rem;font-size:.85rem}
  .alert{padding:.8rem 1rem;border-radius:8px;font-size:.9rem;margin-bottom:1rem}
  .alert.err{background:rgba(184,55,46,.08);color:var(--red);border:1px solid rgba(184,55,46,.2)}
  .alert.ok{background:rgba(45,122,62,.08);color:var(--brand-dark);border:1px solid rgba(45,122,62,.2)}

  /* DASHBOARD */
  .topbar{background:var(--ink);color:var(--paper);padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10}
  .topbar .brand{display:flex;align-items:center;gap:.8rem}
  .topbar .brand .lw{width:36px;height:36px;border-radius:50%;background:var(--brand);display:flex;align-items:center;justify-content:center;overflow:hidden}
  .topbar .brand .lw img{width:100%;height:100%;object-fit:contain;padding:2px}
  .topbar .brand .t{font-family:'Fraunces',serif;font-size:1rem;font-weight:700}
  .topbar .brand .s{font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(244,239,228,.6);font-weight:600}
  .topbar-r{display:flex;gap:1rem;align-items:center}
  .topbar-r a{color:rgba(244,239,228,.7);text-decoration:none;font-size:.85rem}
  .topbar-r a:hover{color:var(--brand-soft)}

  .wrap{max-width:1200px;margin:0 auto;padding:2rem}
  .tabs{display:flex;gap:.5rem;background:var(--paper-alt);padding:.4rem;border-radius:12px;margin-bottom:2rem;max-width:480px}
  .tab{flex:1;padding:.7rem 1rem;border-radius:8px;cursor:pointer;border:0;background:transparent;font-family:inherit;font-size:.9rem;font-weight:600;color:var(--ink-soft);transition:all .2s}
  .tab.active{background:var(--brand);color:#fff}

  .section-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;flex-wrap:wrap;gap:1rem}
  .section-head h2{font-family:'Fraunces',serif;font-size:1.8rem;font-weight:700}
  .section-head .count{color:var(--ink-soft);font-size:.9rem}

  .list{display:grid;gap:1rem;margin-bottom:2rem}
  .item{background:#fff;border:1px solid var(--line);border-radius:12px;padding:1.2rem;display:grid;grid-template-columns:auto auto 1fr auto;gap:1rem;align-items:center;transition:box-shadow .2s,transform .2s}
  .item.dragging{opacity:.4}
  .item.drag-over{box-shadow:0 0 0 2px var(--brand);transform:scale(1.01)}
  .item .handle{cursor:grab;color:var(--ink-soft);font-size:1.3rem;padding:.4rem;user-select:none;touch-action:none}
  .item .handle:active{cursor:grabbing}
  .item .thumb{width:70px;height:70px;border-radius:8px;background:var(--paper-alt);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;font-size:1.8rem;color:var(--ink-soft)}
  .item .thumb img{width:100%;height:100%;object-fit:cover}
  .item h3{font-family:'Fraunces',serif;font-size:1.1rem;font-weight:600;margin-bottom:.2rem}
  .item .meta{font-size:.82rem;color:var(--ink-soft);display:flex;gap:1rem;flex-wrap:wrap}
  .item .actions{display:flex;gap:.5rem}
  .hint{color:var(--ink-soft);font-size:.85rem;margin-bottom:1rem;padding:.6rem 1rem;background:rgba(45,122,62,.06);border-radius:8px;border-left:3px solid var(--brand)}

  .form-card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:2rem;margin-bottom:2rem}
  .form-card h3{font-family:'Fraunces',serif;font-size:1.3rem;margin-bottom:1.5rem}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
  .form-actions{display:flex;gap:.8rem;margin-top:1.5rem;padding-top:1.5rem;border-top:1px solid var(--line)}

  .upload-box{border:2px dashed var(--line);border-radius:10px;padding:1.5rem;text-align:center;cursor:pointer;background:var(--paper-alt);transition:border-color .2s}
  .upload-box:hover{border-color:var(--brand)}
  .upload-box input{display:none}
  .upload-box .ph{color:var(--ink-soft);font-size:.9rem}
  .upload-preview{margin-top:.8rem;font-size:.85rem;color:var(--brand-dark);font-weight:600;word-break:break-all;display:flex;flex-direction:column;align-items:center;gap:.6rem}
  .upload-preview img{max-width:180px;max-height:180px;border-radius:8px;border:1px solid var(--line);background:#fff;object-fit:contain;box-shadow:0 6px 20px rgba(14,26,43,.08)}
  .upload-preview .fname{font-size:.8rem;color:var(--ink-soft);font-weight:500}
  .upload-preview .ok{color:var(--brand-dark);font-weight:700}
  .upload-preview .docs-list{display:flex;flex-direction:column;gap:.3rem;align-items:stretch;width:100%}
  .upload-preview .docs-list div{padding:.4rem .6rem;background:#fff;border-radius:6px;border:1px solid var(--line);text-align:left;font-size:.82rem}

  .empty{text-align:center;padding:3rem;color:var(--ink-soft);background:var(--paper-alt);border-radius:12px}

  /* AI Modal */
  .modal-bg{position:fixed;inset:0;background:rgba(14,26,43,.6);backdrop-filter:blur(6px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:2rem;overflow-y:auto}
  .modal{background:#fff;border-radius:18px;max-width:600px;width:100%;padding:2rem;box-shadow:0 30px 80px rgba(0,0,0,.3);max-height:90vh;overflow-y:auto}
  .modal h3{font-family:'Fraunces',serif;font-size:1.5rem;margin-bottom:.4rem;display:flex;align-items:center;gap:.6rem}
  .modal h3 .spark{background:linear-gradient(135deg,#7b4fbf,#b8372e);-webkit-background-clip:text;background-clip:text;color:transparent}
  .modal .sub{color:var(--ink-soft);font-size:.9rem;margin-bottom:1.5rem}
  .modal .modal-actions{display:flex;gap:.8rem;margin-top:1.5rem;padding-top:1.5rem;border-top:1px solid var(--line)}
  .btn.ai{background:linear-gradient(135deg,#7b4fbf,#b8372e);color:#fff;border:0}
  .btn.ai:hover{filter:brightness(1.1);transform:translateY(-1px)}
  .ai-trigger{display:inline-flex;align-items:center;gap:.4rem;padding:.5rem 1rem;background:linear-gradient(135deg,rgba(123,79,191,.1),rgba(184,55,46,.1));color:#7b4fbf;border:1px solid rgba(123,79,191,.2);border-radius:999px;font-size:.85rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
  .ai-trigger:hover{background:linear-gradient(135deg,rgba(123,79,191,.2),rgba(184,55,46,.2))}
  .form-card h3{display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap}

  @media(max-width:700px){
    .form-row{grid-template-columns:1fr}
    .item{grid-template-columns:1fr;text-align:center}
    .item .actions{justify-content:center}
  }
</style>
</head>
<body>

<div id="app"></div>

<script>
const app = document.getElementById('app');
let state = { admin: false, tab: 'events', events: [], news: [], projects: [], editing: null, msg: null };

async function api(path, opts = {}) {
  const r = await fetch(path, { credentials: 'include', ...opts,
    headers: { 'Content-Type': 'application/json', ...(opts.headers || {}) } });
  if (!r.ok) throw new Error((await r.json()).error || 'Errore');
  return r.json();
}

async function uploadFile(file) {
  const fd = new FormData(); fd.append('file', file);
  const r = await fetch('/api/upload', { method: 'POST', body: fd, credentials: 'include' });
  if (!r.ok) throw new Error('Upload fallito');
  return r.json();
}

function esc(s) { return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function isImage(url) { return /\.(png|jpe?g|gif|webp|svg|avif)(\?|$)/i.test(url||''); }
function isPdf(url) { return /\.pdf(\?|$)/i.test(url||''); }
function previewHtml(url, label) {
  if (!url) return '';
  const safe = esc(url);
  if (isImage(url)) {
    return `<img src="${safe}" alt="preview"><span class="ok">${esc(label || '✓ Caricata')}</span><span class="fname">${safe}</span>`;
  }
  if (isPdf(url)) {
    return `<div style="display:flex;gap:.8rem;align-items:center;padding:.8rem 1rem;background:#fff;border:1px solid var(--line);border-radius:8px"><span style="font-size:1.8rem">📄</span><div><div class="ok">${esc(label || '✓ PDF caricato')}</div><a href="${safe}" target="_blank" style="font-size:.78rem;color:var(--ink-soft)">${safe}</a></div></div>`;
  }
  return `<span class="ok">${esc(label || '✓')} ${safe}</span>`;
}

function render() {
  if (!state.admin) return renderLogin();
  renderDashboard();
}

function renderLogin() {
  app.innerHTML = `
    <div class="login-screen">
      <form class="login-card" id="loginForm">
        <div class="logo"><img src="/public/logo.png?v=3" alt=""></div>
        <h1>Area riservata</h1>
        <p class="sub">Com.Art.Pro APS ETS · Gestione contenuti</p>
        ${state.msg ? `<div class="alert err">${esc(state.msg)}</div>` : ''}
        <div class="field"><label>Password amministratore</label><input type="password" id="pwd" required autofocus></div>
        <button class="btn primary" type="submit">Accedi</button>
      </form>
    </div>`;
  document.getElementById('loginForm').onsubmit = async e => {
    e.preventDefault();
    try {
      await api('/api/login', { method: 'POST', body: JSON.stringify({ password: document.getElementById('pwd').value }) });
      state.admin = true; state.msg = null;
      await loadAll();
    } catch (err) { state.msg = err.message; render(); }
  };
}

async function loadAll() {
  const [events, news, projects] = await Promise.all([
    api('/api/events'), api('/api/news'), api('/api/projects')
  ]);
  state.events = events; state.news = news; state.projects = projects;
  render();
}

function renderDashboard() {
  app.innerHTML = `
    <div class="topbar">
      <a class="brand" href="/admin" style="text-decoration:none;color:inherit">
        <span class="lw"><img src="/public/logo.png?v=3" alt=""></span>
        <div><div class="t">Com.Art.Pro</div><div class="s">Area riservata</div></div>
      </a>
      <div class="topbar-r">
        <a href="/" target="_blank">Vedi sito ↗</a>
        <button class="btn ghost small" id="logoutBtn" style="color:var(--paper);border-color:rgba(244,239,228,.3)">Esci</button>
      </div>
    </div>
    <div class="wrap">
      <div class="tabs">
        <button class="tab ${state.tab==='events'?'active':''}" data-tab="events">Eventi</button>
        <button class="tab ${state.tab==='news'?'active':''}" data-tab="news">Notizie</button>
        <button class="tab ${state.tab==='projects'?'active':''}" data-tab="projects">Progetti</button>
      </div>
      <div id="tabContent"></div>
    </div>`;
  document.getElementById('logoutBtn').onclick = async () => {
    await api('/api/logout', { method: 'POST' });
    state.admin = false; render();
  };
  document.querySelectorAll('.tab').forEach(t => t.onclick = () => { state.tab = t.dataset.tab; state.editing = null; renderTab(); });
  renderTab();
}

function renderTab() {
  const c = document.getElementById('tabContent');
  if (state.tab === 'events') c.innerHTML = eventsView();
  if (state.tab === 'news') c.innerHTML = newsView();
  if (state.tab === 'projects') c.innerHTML = projectsView();
  bindForms();
}

/* ——— EVENTS ——— */
function eventsView() {
  const items = state.events;
  const form = state.editing?.type === 'event' ? state.editing.data : null;
  return `
    <div class="section-head">
      <h2>Eventi</h2>
      <button class="btn primary small" onclick="startEdit('event')">+ Nuovo evento</button>
    </div>
    ${form ? eventForm(form) : ''}
    ${items.length > 1 ? '<div class="hint">💡 Trascina la maniglia ⋮⋮ per riordinare</div>' : ''}
    <div class="list" data-list="events">
      ${items.length ? items.map(e => `
        <div class="item" draggable="true" data-id="${esc(e.id)}">
          <div class="handle" title="Trascina per riordinare">⋮⋮</div>
          <div class="thumb">${e.poster||e.teaser ? `<img src="${esc(e.teaser||e.poster)}">` : '📅'}</div>
          <div>
            <h3>${esc(e.title)}</h3>
            <div class="meta">
              <span>📅 ${esc(formatDate(e.date))}</span>
              ${e.location ? `<span>📍 ${esc(e.location.split(',')[0])}</span>` : ''}
            </div>
          </div>
          <div class="actions">
            <button class="btn ghost small" onclick="startEdit('event','${e.id}')">Modifica</button>
            <button class="btn danger small" onclick="del('events','${e.id}')">Elimina</button>
          </div>
        </div>`).join('') : '<div class="empty">Nessun evento. Crea il primo.</div>'}
    </div>`;
}

function eventForm(d) {
  return `
    <form class="form-card" data-form="event" data-id="${esc(d.id||'')}">
      <h3>${d.id ? 'Modifica evento' : 'Nuovo evento'} <button type="button" class="ai-trigger" onclick="openAI('event')">✨ Genera con AI</button></h3>
      <div class="field"><label>Titolo *</label><input name="title" required value="${esc(d.title||'')}"></div>
      <div class="form-row">
        <div class="field"><label>Data e ora *</label><input name="date" type="datetime-local" required value="${esc(d.date?d.date.slice(0,16):'')}"></div>
        <div class="field"><label>Luogo</label><input name="location" value="${esc(d.location||'')}" placeholder="Palazzo Ducale, Alessano"></div>
      </div>
      <div class="field"><label>Descrizione</label><textarea name="description">${esc(d.description||'')}</textarea></div>
      <div class="form-row">
        <div class="field"><label>Locandina (immagine principale)</label>
          <label class="upload-box"><input type="file" accept="image/*" data-target="poster">
            <div class="ph">📎 Clicca per caricare</div>
            <div class="upload-preview" data-preview="poster">${previewHtml(d.poster, 'Attuale')}</div>
          </label>
          <input type="hidden" name="poster" value="${esc(d.poster||'')}">
        </div>
        <div class="field"><label>Foto teaser (anteprima lista)</label>
          <label class="upload-box"><input type="file" accept="image/*" data-target="teaser">
            <div class="ph">📎 Clicca per caricare</div>
            <div class="upload-preview" data-preview="teaser">${previewHtml(d.teaser, 'Attuale')}</div>
          </label>
          <input type="hidden" name="teaser" value="${esc(d.teaser||'')}">
        </div>
      </div>
      <div class="field"><label>PDF locandina (opzionale)</label>
        <label class="upload-box"><input type="file" accept="application/pdf" data-target="pdf">
          <div class="ph">📎 Clicca per caricare</div>
          <div class="upload-preview" data-preview="pdf">${previewHtml(d.pdf, 'Attuale')}</div>
        </label>
        <input type="hidden" name="pdf" value="${esc(d.pdf||'')}">
      </div>
      <div class="field"><label>Organizzato da</label><input name="organizers" value="${esc(d.organizers||'')}" placeholder="Associazione X · Associazione Y"></div>
      <div class="field"><label>Con il sostegno di</label><input name="sponsors" value="${esc(d.sponsors||'')}" placeholder="Sponsor 1 · Sponsor 2"></div>
      <div class="field"><label>Info / dettagli aggiuntivi</label><input name="info" value="${esc(d.info||'')}" placeholder="Ingresso libero · Info 349.xxx"></div>
      <div class="field"><label>Approfondimento (markdown) — pagina dettaglio</label><textarea name="content" rows="10" placeholder="## Contesto&#10;Testo esteso dell'evento...&#10;&#10;## Programma&#10;...">${esc(d.content||'')}</textarea>
        <div style="font-size:.78rem;color:var(--ink-soft);margin-top:.4rem">Se compilato, sarà generata una pagina di approfondimento linkata dalla card evento.</div>
      </div>
      <div class="form-actions">
        <button class="btn primary" type="submit">${d.id ? 'Salva modifiche' : 'Crea evento'}</button>
        <button class="btn ghost" type="button" onclick="cancelEdit()">Annulla</button>
      </div>
    </form>`;
}

/* ——— NEWS ——— */
function newsView() {
  const items = state.news;
  const form = state.editing?.type === 'news' ? state.editing.data : null;
  return `
    <div class="section-head">
      <h2>Notizie</h2>
      <button class="btn primary small" onclick="startEdit('news')">+ Nuova notizia</button>
    </div>
    ${form ? newsForm(form) : ''}
    ${items.length > 1 ? '<div class="hint">💡 Trascina la maniglia ⋮⋮ per riordinare</div>' : ''}
    <div class="list" data-list="news">
      ${items.length ? items.map(n => `
        <div class="item" draggable="true" data-id="${esc(n.id)}">
          <div class="handle" title="Trascina per riordinare">⋮⋮</div>
          <div class="thumb">${n.image ? `<img src="${esc(n.image)}">` : '📰'}</div>
          <div>
            <h3>${esc(n.title)}</h3>
            <div class="meta"><span>${esc(formatDate(n.date))}</span>${n.excerpt?`<span>${esc(n.excerpt.slice(0,80))}…</span>`:''}</div>
          </div>
          <div class="actions">
            <button class="btn ghost small" onclick="startEdit('news','${n.id}')">Modifica</button>
            <button class="btn danger small" onclick="del('news','${n.id}')">Elimina</button>
          </div>
        </div>`).join('') : '<div class="empty">Nessuna notizia pubblicata.</div>'}
    </div>`;
}
function newsForm(d) {
  return `
    <form class="form-card" data-form="news" data-id="${esc(d.id||'')}">
      <h3>${d.id ? 'Modifica notizia' : 'Nuova notizia'} <button type="button" class="ai-trigger" onclick="openAI('news')">✨ Genera con AI</button></h3>
      <div class="field"><label>Titolo *</label><input name="title" required value="${esc(d.title||'')}"></div>
      <div class="form-row">
        <div class="field"><label>Data pubblicazione *</label><input name="date" type="date" required value="${esc(d.date?d.date.slice(0,10):'')}"></div>
        <div class="field"><label>Autore</label><input name="author" value="${esc(d.author||'')}"></div>
      </div>
      <div class="field"><label>Sommario</label><textarea name="excerpt" maxlength="200" placeholder="2 righe di anteprima">${esc(d.excerpt||'')}</textarea></div>
      <div class="field"><label>Testo completo</label><textarea name="body" rows="10">${esc(d.body||'')}</textarea></div>
      <div class="field"><label>Immagine principale</label>
        <label class="upload-box"><input type="file" accept="image/*" data-target="image">
          <div class="ph">📎 Clicca per caricare</div>
          <div class="upload-preview" data-preview="image">${previewHtml(d.image, 'Attuale')}</div>
        </label>
        <input type="hidden" name="image" value="${esc(d.image||'')}">
      </div>
      <div class="form-actions">
        <button class="btn primary" type="submit">${d.id?'Salva modifiche':'Pubblica'}</button>
        <button class="btn ghost" type="button" onclick="cancelEdit()">Annulla</button>
      </div>
    </form>`;
}

/* ——— PROJECTS ——— */
function projectsView() {
  const items = state.projects;
  const form = state.editing?.type === 'project' ? state.editing.data : null;
  return `
    <div class="section-head">
      <h2>Progetti</h2>
      <button class="btn primary small" onclick="startEdit('project')">+ Nuovo progetto</button>
    </div>
    ${form ? projectForm(form) : ''}
    ${items.length > 1 ? '<div class="hint">💡 Trascina la maniglia ⋮⋮ per riordinare — definisce anche l\'ordine sul sito pubblico</div>' : ''}
    <div class="list" data-list="projects">
      ${items.length ? items.map(p => `
        <div class="item" draggable="true" data-id="${esc(p.id)}">
          <div class="handle" title="Trascina per riordinare">⋮⋮</div>
          <div class="thumb" style="${p.image?'':'background:'+colorFor(p.color)+';color:#fff;font-family:\'Fraunces\',serif;font-weight:700;font-size:1.3rem'}">${p.image?`<img src="${esc(p.image)}">`:esc((p.name||'').slice(0,2).toUpperCase())}</div>
          <div>
            <h3>${esc(p.name)}</h3>
            <div class="meta"><span>${esc(p.tag||'')}</span><span>● ${esc(p.status||'—')}</span></div>
          </div>
          <div class="actions">
            <button class="btn ghost small" onclick="startEdit('project','${p.id}')">Modifica</button>
            <button class="btn danger small" onclick="del('projects','${p.id}')">Elimina</button>
          </div>
        </div>`).join('') : '<div class="empty">Nessun progetto.</div>'}
    </div>`;
}
function projectForm(d) {
  return `
    <form class="form-card" data-form="project" data-id="${esc(d.id||'')}">
      <h3>${d.id?'Modifica progetto':'Nuovo progetto'} <button type="button" class="ai-trigger" onclick="openAI('project')">✨ Genera con AI</button></h3>
      <div class="form-row">
        <div class="field"><label>Nome *</label><input name="name" required value="${esc(d.name||'')}"></div>
        <div class="field"><label>Tag categoria</label><input name="tag" value="${esc(d.tag||'')}" placeholder="Promozione commercio"></div>
      </div>
      <div class="field"><label>Descrizione</label><textarea name="description">${esc(d.description||'')}</textarea></div>
      <div class="form-row">
        <div class="field"><label>Stato</label><input name="status" value="${esc(d.status||'')}" placeholder="Attivo / Ricorrente / ..."></div>
        <div class="field"><label>Colore</label>
          <select name="color">
            ${['brand','gold','red','ink'].map(c=>`<option value="${c}" ${d.color===c?'selected':''}>${c}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="field"><label>Immagine progetto / teaser</label>
        <label class="upload-box"><input type="file" accept="image/*" data-target="image">
          <div class="ph">📎 Clicca per caricare</div>
          <div class="upload-preview" data-preview="image">${previewHtml(d.image, 'Attuale')}</div>
        </label>
        <input type="hidden" name="image" value="${esc(d.image||'')}">
      </div>
      <div class="field"><label>Link esterno (opzionale)</label><input name="link" value="${esc(d.link||'')}" placeholder="https://..."></div>
      <div class="field"><label>Approfondimento (markdown) — pagina dettaglio</label><textarea name="content" rows="10" placeholder="## Perché questo progetto&#10;...&#10;&#10;## Come funziona&#10;...">${esc(d.content||'')}</textarea>
        <div style="font-size:.78rem;color:var(--ink-soft);margin-top:.4rem">Se compilato, sarà generata una pagina di approfondimento linkata dalla card progetto.</div>
      </div>
      <div class="form-actions">
        <button class="btn primary" type="submit">${d.id?'Salva modifiche':'Crea progetto'}</button>
        <button class="btn ghost" type="button" onclick="cancelEdit()">Annulla</button>
      </div>
    </form>`;
}

/* ——— Actions ——— */
window.startEdit = function(type, id) {
  const map = { event: state.events, news: state.news, project: state.projects };
  const key = type === 'event' ? 'events' : type === 'news' ? 'news' : 'projects';
  const data = id ? state[key].find(x => x.id === id) || {} : {};
  state.editing = { type, data: { ...data } };
  renderTab();
};
window.cancelEdit = function() { state.editing = null; renderTab(); };
window.del = async function(coll, id) {
  if (!confirm('Eliminare definitivamente?')) return;
  await api(`/api/${coll}/${id}`, { method: 'DELETE' });
  await loadAll();
};

function bindDragDrop() {
  document.querySelectorAll('[data-list]').forEach(list => {
    const coll = list.dataset.list;
    let dragging = null;
    list.querySelectorAll('.item').forEach(item => {
      item.addEventListener('dragstart', e => {
        dragging = item; item.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
      });
      item.addEventListener('dragend', () => {
        item.classList.remove('dragging');
        list.querySelectorAll('.item').forEach(i => i.classList.remove('drag-over'));
        dragging = null;
      });
      item.addEventListener('dragover', e => {
        e.preventDefault();
        if (!dragging || dragging === item) return;
        item.classList.add('drag-over');
      });
      item.addEventListener('dragleave', () => item.classList.remove('drag-over'));
      item.addEventListener('drop', async e => {
        e.preventDefault();
        item.classList.remove('drag-over');
        if (!dragging || dragging === item) return;
        const all = [...list.querySelectorAll('.item')];
        const dragIdx = all.indexOf(dragging);
        const dropIdx = all.indexOf(item);
        if (dragIdx < dropIdx) item.after(dragging); else item.before(dragging);
        const ids = [...list.querySelectorAll('.item')].map(i => i.dataset.id);
        try {
          await api(`/api/${coll}/reorder`, { method: 'POST', body: JSON.stringify({ ids }) });
          await loadAll();
        } catch (err) { alert('Errore riordino: ' + err.message); }
      });
    });
  });
}

function bindForms() {
  bindDragDrop();
  document.querySelectorAll('[data-form]').forEach(f => {
    f.onsubmit = async e => {
      e.preventDefault();
      const data = {}; new FormData(f).forEach((v,k) => data[k] = v);
      if (data.date && !data.date.includes('T') && data.date.length === 10) data.date = data.date + 'T00:00:00';
      const id = f.dataset.id;
      const coll = f.dataset.form === 'event' ? 'events' : f.dataset.form === 'news' ? 'news' : 'projects';
      try {
        if (id) await api(`/api/${coll}/${id}`, { method: 'PUT', body: JSON.stringify(data) });
        else await api(`/api/${coll}`, { method: 'POST', body: JSON.stringify(data) });
        state.editing = null;
        await loadAll();
      } catch (err) { alert('Errore: ' + err.message); }
    };
  });
  document.querySelectorAll('[data-target]').forEach(inp => {
    inp.onchange = async e => {
      const file = e.target.files[0]; if (!file) return;
      const target = e.target.dataset.target;
      const form = e.target.closest('form');
      const preview = form.querySelector(`[data-preview="${target}"]`);
      preview.innerHTML = '<span class="fname">⏳ Caricamento…</span>';
      try {
        const r = await uploadFile(file);
        form.querySelector(`input[name="${target}"]`).value = r.url;
        preview.innerHTML = previewHtml(r.url, '✓ ' + r.name);
      } catch (err) {
        preview.innerHTML = `<span style="color:var(--red)">Errore: ${esc(err.message)}</span>`;
      }
    };
  });
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleString('it-IT', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
}
function colorFor(c) {
  return { brand:'var(--brand)', gold:'var(--gold)', red:'var(--red)', ink:'var(--ink)' }[c] || 'var(--brand)';
}

/* ——— AI draft modal ——— */
window.openAI = async function(type) {
  const labels = { project:'progetto', event:'evento', news:'notizia' };
  // Check config first
  let aiStatus;
  try { aiStatus = await api('/api/ai/status'); } catch { aiStatus = { configured: false }; }

  const modal = document.createElement('div');
  modal.className = 'modal-bg';
  modal.innerHTML = `
    <div class="modal">
      <h3><span class="spark">✨</span> Genera bozza ${labels[type]}</h3>
      <p class="sub">Fornisci testo, un'immagine, un link o qualsiasi altra fonte. L'AI produrrà una bozza editabile che potrai poi ritoccare.</p>
      ${!aiStatus.configured ? `<div class="alert err" style="margin-bottom:1.5rem">⚠️ <strong>OPENAI_API_KEY non configurata.</strong> Aggiungi la variabile d'ambiente su Railway → Variables, poi attendi il redeploy.</div>` : `<div style="margin-bottom:1rem;font-size:.78rem;color:var(--ink-soft);letter-spacing:.05em">Modello attivo: <code>${esc(aiStatus.model)}</code></div>`}
      <div class="field">
        <label>Descrizione / idea di base</label>
        <textarea id="aiText" rows="4" placeholder="Es: convegno con il procuratore Gratteri sul narcotraffico, si terrà al Palazzo Ducale il 17 aprile alle 19:30, organizzato con NarrAzioni e Idrusa Libreria..."></textarea>
      </div>
      <div class="field">
        <label>Link fonte (opzionale)</label>
        <input type="url" id="aiUrl" placeholder="https://articolo-su-qualcosa.it/...">
      </div>
      <div class="field">
        <label>Immagini di riferimento (opzionale, multiple)</label>
        <label class="upload-box">
          <input type="file" id="aiImages" accept="image/*" multiple>
          <div class="ph">📎 Clicca per caricare locandine, foto, screenshot (fino a 4)</div>
          <div class="upload-preview" id="aiImagesPreview"></div>
        </label>
        <input type="hidden" id="aiImageUrls" value="[]">
      </div>
      <div class="field">
        <label>Allegati / documenti (opzionale)</label>
        <label class="upload-box">
          <input type="file" id="aiDocs" accept=".pdf,.doc,.docx,.txt,.md" multiple>
          <div class="ph">📄 PDF, Word, testo — servono come riferimento nominale per l'AI</div>
          <div class="upload-preview" id="aiDocsPreview"></div>
        </label>
        <input type="hidden" id="aiDocsUrls" value="[]">
      </div>
      <div class="field" style="display:flex;align-items:center;gap:.6rem;padding:.8rem;background:var(--paper-alt);border-radius:8px">
        <input type="checkbox" id="aiGenImg" style="width:auto;margin:0">
        <label for="aiGenImg" style="margin:0;letter-spacing:0;text-transform:none;font-size:.9rem;color:var(--ink);font-weight:500;cursor:pointer">
          Genera immagine con DALL-E (~15s extra)
          <div style="color:var(--ink-soft);font-size:.8rem;font-weight:400;margin-top:.2rem">Se hai già caricato un'immagine di riferimento, questa verrà usata dall'AI come contesto ma NON sostituita. La generata compare insieme nelle gallerie/teaser.</div>
        </label>
      </div>
      <div id="aiStatus" style="margin-top:1rem;display:none"></div>
      <div class="modal-actions">
        <button class="btn ai" id="aiGo">✨ Genera bozza</button>
        <button class="btn ghost" onclick="closeAI()">Annulla</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
  modal.addEventListener('click', e => { if (e.target === modal) closeAI(); });

  async function multiUpload(inputId, urlsId, previewId, showThumbs) {
    const input = document.getElementById(inputId);
    const preview = document.getElementById(previewId);
    const urlsField = document.getElementById(urlsId);
    input.onchange = async () => {
      const files = [...input.files];
      if (!files.length) return;
      if (showThumbs) {
        preview.style.flexDirection = 'row';
        preview.style.flexWrap = 'wrap';
        preview.style.justifyContent = 'center';
        preview.innerHTML = files.map((f,i) => `<div data-idx="${i}" style="text-align:center"><div style="width:80px;height:80px;background:#fff;border:1px solid var(--line);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.7rem;color:var(--ink-soft)">⏳</div><div style="font-size:.7rem;margin-top:.3rem;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(f.name)}</div></div>`).join('');
      } else {
        preview.innerHTML = `<div class="docs-list">${files.map((f,i) => `<div data-idx="${i}">⏳ ${esc(f.name)}</div>`).join('')}</div>`;
      }
      const existing = JSON.parse(urlsField.value || '[]');
      const newUrls = [];
      for (let i = 0; i < files.length; i++) {
        try {
          const r = await uploadFile(files[i]);
          newUrls.push({ url: r.url, name: r.name });
          const node = preview.querySelector(`[data-idx="${i}"]`);
          if (showThumbs) {
            node.innerHTML = `<img src="${esc(r.url)}" style="width:80px;height:80px;object-fit:cover;border-radius:6px;border:1px solid var(--line)"><div style="font-size:.7rem;margin-top:.3rem;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--brand-dark)">✓ ${esc(r.name)}</div>`;
          } else {
            node.innerHTML = `📄 ✓ ${esc(r.name)}`;
          }
        } catch (err) {
          const node = preview.querySelector(`[data-idx="${i}"]`);
          if (node) node.textContent = '✗ ' + err.message;
        }
      }
      urlsField.value = JSON.stringify([...existing, ...newUrls]);
    };
  }
  multiUpload('aiImages', 'aiImageUrls', 'aiImagesPreview', true);
  multiUpload('aiDocs', 'aiDocsUrls', 'aiDocsPreview', false);

  document.getElementById('aiGo').onclick = async () => {
    const text = document.getElementById('aiText').value.trim();
    const sourceUrl = document.getElementById('aiUrl').value.trim();
    const images = JSON.parse(document.getElementById('aiImageUrls').value || '[]');
    const docs = JSON.parse(document.getElementById('aiDocsUrls').value || '[]');
    const imageUrls = images.map(x => x.url);
    const docNames = docs.map(x => x.name);
    const genImg = document.getElementById('aiGenImg').checked;
    if (!text && !sourceUrl && !imageUrls.length && !docNames.length) {
      alert('Fornisci almeno una fonte: testo, link, immagine o documento.');
      return;
    }
    const status = document.getElementById('aiStatus');
    const btn = document.getElementById('aiGo');
    btn.disabled = true;
    status.style.display = 'block';
    status.innerHTML = '<div class="alert ok">⏳ Generazione bozza in corso...</div>';
    try {
      const draft = await api('/api/ai/draft', { method: 'POST',
        body: JSON.stringify({ type, text, sourceUrl, imageUrls, documents: docNames }) });
      let generatedImage = null;
      let imageError = null;
      if (genImg) {
        if (!draft.suggestedImagePrompt) {
          imageError = 'L\'AI non ha fornito un prompt immagine utilizzabile.';
        } else {
          status.innerHTML = `<div class="alert ok">🎨 Generazione immagine DALL-E (può richiedere 15-30s)...<br><small style="font-weight:400;opacity:.75">Prompt: ${esc(draft.suggestedImagePrompt.slice(0,120))}${draft.suggestedImagePrompt.length>120?'…':''}</small></div>`;
          try {
            const img = await api('/api/ai/image', { method: 'POST',
              body: JSON.stringify({ prompt: draft.suggestedImagePrompt }) });
            generatedImage = img.url;
          } catch (err) {
            imageError = err.message;
            console.error('DALL-E error:', err);
          }
        }
      }
      // Applica sempre il testo; gestisce immagine con priorità upload → generata
      applyDraft(type, draft, generatedImage, imageUrls[0]);
      if (imageError) {
        status.innerHTML = `<div class="alert err">⚠️ Bozza testo applicata, ma generazione immagine fallita: ${esc(imageError)}<br><small>Puoi riprovare manualmente o caricare un'immagine.</small></div>`;
        btn.textContent = 'Chiudi';
        btn.disabled = false;
        btn.onclick = closeAI;
      } else {
        closeAI();
      }
    } catch (err) {
      status.innerHTML = `<div class="alert err">${esc(err.message)}</div>`;
      btn.disabled = false;
    }
  };
};

window.closeAI = function() {
  const m = document.querySelector('.modal-bg');
  if (m) m.remove();
};

function applyDraft(type, draft, generatedImage, sourceImage) {
  // Carica il form se non è già aperto
  if (!state.editing || state.editing.type !== type) {
    state.editing = { type, data: {} };
    renderTab();
  }
  const form = document.querySelector(`[data-form="${type}"]`);
  if (!form) return;

  const map = {
    project: { name:'name', tag:'tag', description:'description', status:'status', content:'content' },
    event:   { title:'title', date:'date', location:'location', description:'description', content:'content', organizers:'organizers', sponsors:'sponsors', info:'info' },
    news:    { title:'title', excerpt:'excerpt', body:'body' }
  };
  const imageField = type === 'event' ? 'poster' : 'image';

  const fields = map[type];
  Object.entries(fields).forEach(([k, name]) => {
    if (draft[k] == null) return;
    const input = form.querySelector(`[name="${name}"]`);
    if (!input) return;
    let val = draft[k];
    if (name === 'date' && val && !val.includes('T')) val = val + 'T19:00';
    input.value = val;
  });

  // Priorità: 1) se c'è upload utente → usa quello come immagine principale; 2) altrimenti quella generata.
  // Se ci sono entrambe, la generata va in teaser (eventi) o resta disponibile.
  const mainImage = sourceImage || generatedImage;
  if (mainImage) {
    const img = form.querySelector(`input[name="${imageField}"]`);
    if (img) {
      img.value = mainImage;
      const preview = form.querySelector(`[data-preview="${imageField}"]`);
      const label = mainImage === generatedImage ? '✓ Generata con AI' : '✓ Caricata';
      if (preview) preview.innerHTML = previewHtml(mainImage, label);
    }
  }
  if (type === 'event' && sourceImage && generatedImage) {
    const teaser = form.querySelector('input[name="teaser"]');
    if (teaser) {
      teaser.value = generatedImage;
      const p = form.querySelector('[data-preview="teaser"]');
      if (p) p.innerHTML = previewHtml(generatedImage, '✓ AI (teaser)');
    }
  }
  // Flash visivo
  form.style.transition = 'box-shadow .6s';
  form.style.boxShadow = '0 0 0 3px rgba(123,79,191,.3)';
  setTimeout(() => form.style.boxShadow = '', 1500);
}

/* ——— boot ——— */
(async () => {
  try {
    const me = await api('/api/me');
    state.admin = me.admin;
    if (state.admin) await loadAll();
    else render();
  } catch { render(); }
})();
</script>
